name: Bug report
description: Something in the kit is not working as documented
labels: [bug]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CPI iFlow (which one? add it in the description)
        - ABAP client (ZCL_FORSIGN_CLIENT / ZFORSIGN_DEMO)
        - Fiori cockpit
        - Docs / samples / Postman
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Kit version
      placeholder: v1.0.0
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include the canonical error JSON returned by the kit, if any. Never paste API keys or webhook secrets.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Integration Suite region/tenant type, ABAP release (if applicable), browser (Fiori)
