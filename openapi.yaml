openapi: 3.0.3
info:
  title: ForSign SAP Integration Kit
  version: 1.0.0
  description: |
    Contrato canônico dos endpoints expostos pelos iFlows do kit no
    SAP Integration Suite (Cloud Integration). Os iFlows traduzem este
    contrato para a API pública do ForSign (https://api.forsign.digital).

    Autenticação: credencial da service key da instância de runtime do
    Cloud Integration (Basic ou OAuth2 client credentials, conforme o tenant).
  contact:
    email: help@forsign.digital

servers:
  - url: https://{runtime}.it-cpi{tenant}.cfapps.{region}.hana.ondemand.com/http
    description: Runtime do Cloud Integration
    variables:
      runtime: { default: my-runtime }
      tenant: { default: '001' }
      region: { default: br10 }

security:
  - basicAuth: []
  - oauth2ClientCredentials: []

paths:
  /forsign/v1/operations:
    post:
      operationId: createOperation
      summary: Criar operação de assinatura
      description: |
        Faz upload do documento (base64) e cria a operação no ForSign em uma
        única chamada. Tipos visuais de assinatura (Draw, Text, Stamp,
        UserChoice, AutomaticStamp) exigem signatures[].positions.
        O documentId dentro de signatures/rubrics/formFields é injetado
        automaticamente pelo iFlow com o id do upload.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOperationRequest' }
      responses:
        '200':
          description: Operação criada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateOperationResponse' }
        '400': { $ref: '#/components/responses/CanonicalError' }
        '500': { $ref: '#/components/responses/CanonicalError' }

  /forsign/v1/operations/status:
    get:
      operationId: getOperationStatus
      summary: Consultar status da operação
      parameters:
        - name: operationId
          in: query
          required: true
          description: ID numérico da operação (retornado na criação).
          schema: { type: integer, format: int64, example: 4821 }
      responses:
        '200':
          description: Status da operação e progresso por assinante
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OperationStatusResponse' }
        '400': { $ref: '#/components/responses/CanonicalError' }
        '500': { $ref: '#/components/responses/CanonicalError' }

  /forsign/v1/operations/download:
    get:
      operationId: downloadDocument
      summary: Baixar documento assinado (base64)
      description: |
        Chame após o webhook DocumentReady. documentId é o id numérico do
        documento na operação (documents[].documentId da resposta da criação).
      parameters:
        - name: operationId
          in: query
          required: true
          schema: { type: integer, format: int64, example: 4821 }
        - name: documentId
          in: query
          required: true
          schema: { type: integer, format: int64, example: 1 }
      responses:
        '200':
          description: Documento assinado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DownloadResponse' }
        '400': { $ref: '#/components/responses/CanonicalError' }
        '500': { $ref: '#/components/responses/CanonicalError' }

  /forsign/v1/webhook:
    post:
      operationId: receiveWebhook
      summary: Receptor de webhooks do ForSign (uso interno)
      description: |
        Endpoint chamado pelo ForSign, não pelo SAP. Valida a assinatura
        HMAC-SHA256 (X-ForSign-Signature) e encaminha o evento canônico
        (WebhookEvent) ao endpoint SAP configurado no iFlow.
      parameters:
        - name: X-ForSign-Signature
          in: header
          required: true
          schema: { type: string, example: 'sha256=9b2f...' }
        - name: X-ForSign-Timestamp
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: WebhookData do ForSign (payload bruto).
      responses:
        '200': { description: Evento validado e encaminhado ao SAP }
        '401': { $ref: '#/components/responses/CanonicalError' }
        '500': { $ref: '#/components/responses/CanonicalError' }

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Service key da instância de runtime do Cloud Integration.
    oauth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://{subdomain}.authentication.{region}.hana.ondemand.com/oauth/token
          scopes: {}

  responses:
    CanonicalError:
      description: Erro canônico do kit
      content:
        application/json:
          schema: { $ref: '#/components/schemas/CanonicalError' }

  schemas:
    CreateOperationRequest:
      type: object
      required: [name, document, signers]
      properties:
        externalId:
          type: string
          description: Chave do objeto SAP (EBELN, VBELN, userId...). Volta nos webhooks.
          example: S4-4500001234
        name: { type: string, example: Contrato de Fornecimento 4500001234 }
        language: { type: string, enum: [pt-br, en, es], default: pt-br }
        sequentialSigning:
          type: boolean
          default: false
          description: true = assinatura sequencial (respeita signers[].order).
        mergeIfExists:
          type: boolean
          description: Com externalId, evita duplicar operação em retry (idempotência).
        manualFinish: { $ref: '#/components/schemas/ManualFinish' }
        optionalMessage: { type: string, description: HTML exibido ao assinante. }
        displayCover: { type: boolean }
        memberMovementWarning: { type: boolean }
        document: { $ref: '#/components/schemas/Document' }
        signers:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/Signer' }
        metadata:
          type: array
          items: { $ref: '#/components/schemas/KeyValue' }

    Document:
      type: object
      required: [fileName, contentBase64]
      properties:
        fileName: { type: string, example: contrato-4500001234.pdf }
        description: { type: string }
        contentBase64: { type: string, description: PDF em base64. Só PDF é aceito. }

    Signer:
      type: object
      required: [name, email]
      description: |
        Campos não listados aqui são repassados sem alteração ao ForSign
        (cpf, antifraudFeatures, rubrics, formTitle, formDescription, ...).
      properties:
        name: { type: string }
        email: { type: string, format: email }
        phone:
          type: string
          description: Formato internacional (5511...). Obrigatório com SMS/Whatsapp.
        role: { type: string, example: Contratante }
        order: { type: integer, description: Posição na ordem (0 = primeiro). Vira orderPosition. }
        observer: { type: boolean, default: false }
        notificationChannel: { type: string, enum: [Email, SMS, Whatsapp, None] }
        authenticationChannel: { type: string, enum: [Email, SMS, Whatsapp] }
        doubleAuthentication: { type: boolean }
        signatureType:
          type: string
          enum: [Click, Draw, Text, UserChoice, Certificate, CloudCertificate]
          description: Tipos visuais (Draw, Text, UserChoice) exigem signatures[].positions.
        signatures:
          type: array
          items: { $ref: '#/components/schemas/SignatureFile' }
        attachments:
          type: array
          items: { $ref: '#/components/schemas/AttachmentRequest' }
        formFields:
          type: array
          items: { $ref: '#/components/schemas/FormField' }

    SignatureFile:
      type: object
      properties:
        documentId:
          type: string
          description: Opcional — o iFlow injeta o id do upload quando ausente.
        printSignature: { type: boolean, default: true }
        positions:
          type: array
          items: { $ref: '#/components/schemas/Position' }

    Position:
      type: object
      required: [page, coordenateX, coordenateY]
      properties:
        page: { type: integer, example: 1 }
        coordenateX: { type: string, example: '10.50%' }
        coordenateY: { type: string, example: '80.00%' }

    AttachmentRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, example: RG ou CNH }
        description: { type: string }
        fileType:
          type: array
          items: { type: string }
          example: [jpg, png, pdf]
        filesAllowed: { type: integer, example: 2 }
        inputAttachment:
          type: array
          items: { type: string }
          example: [CameraSideFront]
        required: { type: boolean }

    FormField:
      type: object
      required: [type, name, fieldType]
      properties:
        type: { type: string, example: Others, description: 'Name/Email/DateNow são auto-preenchidos; Others = digitado.' }
        name: { type: string, example: Centro de custo }
        fieldType: { type: string, example: Text }
        description: { type: string }
        required: { type: boolean }
        max: { type: integer }
        order: { type: integer, description: Ordem global do formulário na operação. }
        documentId: { type: string, description: Injetado pelo iFlow quando há positions. }
        positions:
          type: array
          items: { $ref: '#/components/schemas/Position' }

    ManualFinish:
      type: object
      properties:
        hasManualFinish:
          type: boolean
          description: true = só finaliza via POST /complete no ForSign.
        date:
          type: string
          format: date-time
          description: Prazo limite; ao chegar, a operação expira.

    KeyValue:
      type: object
      properties:
        key: { type: string }
        value: { type: string }

    CreateOperationResponse:
      type: object
      properties:
        operationId:
          type: integer
          format: int64
          example: 4821
          description: ID numérico — use em status, download, cancelar e completar.
        externalId: { type: string }
        status: { $ref: '#/components/schemas/OperationStatus' }
        members:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, format: int64, description: memberId dos endpoints de anexos. }
              name: { type: string }
              email: { type: string }
              order: { type: integer }
              observer: { type: boolean }
              signUrl:
                type: string
                nullable: true
                description: Link de assinatura. Vazio = ainda não é a vez do assinante.
              shortSignUrl: { type: string, nullable: true }
        documents:
          type: array
          items:
            type: object
            properties:
              documentId: { type: integer, format: int64, description: Id numérico usado no download. }
              definitiveDocumentId: { type: string, description: GUID definitivo (API 2.23+). }
              name: { type: string }
              description: { type: string }
        forsign:
          type: object
          description: Resposta completa do ForSign, para campos não mapeados.

    OperationStatus:
      type: string
      enum: [OperationCreated, InProgress, WaitingNotify, WaitingSignatures,
             WaitingForms, CheckingAttachments, Completed, Canceled, Expired]

    OperationStatusResponse:
      type: object
      properties:
        operation:
          type: object
          properties:
            name: { type: string }
            status: { $ref: '#/components/schemas/OperationStatus' }
            stage: { type: string }
            createdAt: { type: string, format: date-time }
            expirationDate: { type: string, format: date-time, nullable: true }
            completedAt: { type: string, format: date-time, nullable: true }
            progressCurrent: { type: integer }
            progressTotal: { type: integer }
        members:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              email: { type: string }
              role: { type: string, nullable: true }
              order: { type: integer }
              observer: { type: boolean }
              status: { type: string }
              stage: { type: string }
              completedAt: { type: string, format: date-time, nullable: true }

    DownloadResponse:
      type: object
      properties:
        fileName: { type: string, example: contrato-4500001234-assinado.pdf }
        contentType: { type: string, example: application/pdf }
        base64Content: { type: string }

    WebhookEvent:
      type: object
      description: Evento canônico encaminhado ao endpoint SAP pelo ForSign_WebhookReceiver.
      properties:
        event: { type: string, example: DocumentReady }
        success: { type: boolean }
        operationId: { type: integer, format: int64 }
        externalId: { type: string }
        operationName: { type: string }
        status: { type: integer }
        occurredAt: { type: string, format: date-time }
        documents:
          type: array
          items:
            type: object
            properties:
              documentId: { type: integer, format: int64 }
              fileName: { type: string }
              totalPages: { type: integer }
        members:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              email: { type: string }
        metadata:
          type: array
          items: { $ref: '#/components/schemas/KeyValue' }
        forsign: { type: object, description: Payload original do webhook ForSign. }

    CanonicalError:
      type: object
      properties:
        error:
          type: object
          properties:
            httpStatus: { type: integer, example: 400 }
            type:
              type: string
              enum: [ValidationError, SecurityError, ForSignApiError, IntegrationError]
            message: { type: string }
            forsignMessages:
              type: array
              items: { type: string }
