name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Structural validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: validate_kit.py
        run: python3 ci/validate_kit.py

  groovy-tests:
    name: Groovy script unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run_all_tests.groovy
        run: |
          docker run --rm -v "$PWD":/kit -w /kit groovy:4-jdk17 \
            groovy -cp tests/mocks tests/run_all_tests.groovy
